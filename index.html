<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Reflection Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a08;
    --surface: #111110;
    --border: #2a2a26;
    --text: #e8e4d8;
    --text-muted: #7a7568;
    --text-dim: #4a4840;
    --accent: #c8a96e;
    --accent-soft: rgba(200,169,110,0.12);
    --green: #7a9e7e;
    --green-soft: rgba(122,158,126,0.12);
    --red-soft: rgba(180,100,80,0.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,169,110,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(122,158,126,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 40px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 60px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .header-title {
    font-size: 13px;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  /* Progress bar */
  .progress-track {
    display: flex;
    gap: 4px;
    margin-bottom: 60px;
    opacity: 0;
    animation: fadeUp 0.8s 0.1s ease forwards;
  }

  .progress-seg {
    flex: 1;
    height: 2px;
    background: var(--border);
    transition: background 0.4s ease;
  }

  .progress-seg.active { background: var(--accent); }
  .progress-seg.done { background: var(--text-dim); }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px;
    position: relative;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s ease forwards;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 2px;
    height: 100%;
    background: linear-gradient(to bottom, var(--accent), transparent);
    opacity: 0.5;
  }

  /* Node type label */
  .node-type {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .node-type::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Question text */
  .question-text {
    font-size: 24px;
    font-weight: 300;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 40px;
    font-style: italic;
  }

  /* Options */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    padding: 16px 20px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    letter-spacing: 0.01em;
  }

  .option-letter {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    min-width: 16px;
  }

  .option:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--accent-soft);
  }

  .option:hover .option-letter { color: var(--accent); }

  .option.selected {
    border-color: var(--accent);
    color: var(--text);
    background: var(--accent-soft);
  }

  .option.selected .option-letter { color: var(--accent); }

  /* Reflection node */
  .reflection-text {
    font-size: 19px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--text-muted);
    font-style: italic;
    border-left: 2px solid var(--accent);
    padding-left: 20px;
    margin-bottom: 36px;
  }

  /* Bridge node */
  .bridge-text {
    font-size: 15px;
    font-weight: 300;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.05em;
    margin-bottom: 36px;
  }

  /* Summary */
  .summary-block {
    margin-bottom: 28px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .summary-block:last-of-type { border-bottom: none; }

  .summary-axis {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .summary-text {
    font-size: 17px;
    font-weight: 300;
    line-height: 1.6;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Start / End */
  .start-text, .end-text {
    font-size: 22px;
    font-weight: 300;
    line-height: 1.6;
    color: var(--text-muted);
    text-align: center;
    font-style: italic;
    margin-bottom: 40px;
  }

  /* Buttons */
  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 32px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.2s ease;
    display: block;
    margin: 0 auto;
  }

  .btn:hover {
    background: var(--accent);
    color: var(--bg);
  }

  .btn:disabled {
    border-color: var(--border);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  .btn:disabled:hover { background: transparent; color: var(--text-dim); }

  .btn-secondary {
    border-color: var(--border);
    color: var(--text-dim);
    font-size: 10px;
    padding: 10px 24px;
    margin-top: 12px;
  }

  .btn-secondary:hover {
    background: var(--border);
    color: var(--text);
  }

  .btn-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    margin-top: 32px;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in {
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }

  /* Tree decoration */
  .tree-deco {
    text-align: center;
    font-size: 28px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 40px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    opacity: 0;
    animation: fadeUp 0.8s 0.3s ease forwards;
  }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-label">DT Fellowship</div>
    <div class="header-title">Daily Reflection Tree</div>
  </div>
  <div class="progress-track" id="progressTrack">
    <div class="progress-seg" id="seg0"></div>
    <div class="progress-seg" id="seg1"></div>
    <div class="progress-seg" id="seg2"></div>
    <div class="progress-seg" id="seg3"></div>
    <div class="progress-seg" id="seg4"></div>
    <div class="progress-seg" id="seg5"></div>
    <div class="progress-seg" id="seg6"></div>
    <div class="progress-seg" id="seg7"></div>
    <div class="progress-seg" id="seg8"></div>
  </div>
  <div class="card" id="card"></div>
  <div class="footer">No LLM · Deterministic · Your path, your reflection</div>
</div>

<script>
const TREE = {
  "nodes": [
    { "id": "START", "type": "start", "text": "Good evening. Take a breath. Let's understand your day together — honestly.", "options": [], "target": "A1_OPEN", "signal": null },
    { "id": "A1_OPEN", "type": "question", "text": "When something you planned today didn't work out — what was your first thought?", "options": ["It's okay, maybe next time", "I could have done something differently", "It wasn't in my control at all", "I felt stuck and couldn't move on easily"], "target": null, "signal": null },
    { "id": "A1_D1", "type": "decision", "text": null, "options": [{ "condition": "answer=It's okay, maybe next time|I could have done something differently", "target": "A1_Q2_INT" }, { "condition": "answer=It wasn't in my control at all|I felt stuck and couldn't move on easily", "target": "A1_Q2_EXT" }], "target": null, "signal": null },
    { "id": "A1_Q2_INT", "type": "question", "text": "When things went differently than planned — did you look for something you could still do?", "options": ["Yes — I found a small way to move forward", "I accepted it and kept going", "I thought about it but didn't act", "Not really — I just let it go"], "target": null, "signal": "axis1:internal" },
    { "id": "A1_Q2_EXT", "type": "question", "text": "When today felt out of your hands — did any part of it feel like your call?", "options": ["Looking back, yes — I had at least one choice", "Maybe — I'm not sure yet", "Not really — it was mostly outside me", "No — someone else controlled the outcome"], "target": null, "signal": "axis1:external" },
    { "id": "A1_D2", "type": "decision", "text": null, "options": [{ "condition": "signal:axis1:internal>=1", "target": "A1_R_INT" }, { "condition": "signal:axis1:external>=1", "target": "A1_R_EXT" }, { "condition": "default", "target": "A1_R_INT" }], "target": null, "signal": null },
    { "id": "A1_R_INT", "type": "reflection", "text": "You didn't let an unplanned moment define your day. You looked for what was still in your hands — and that's a quiet kind of strength. Not everything needs to go right for you to show up right.", "options": [], "target": "BRIDGE_1_2", "signal": "axis1:internal" },
    { "id": "A1_R_EXT", "type": "reflection", "text": "Some days the circumstances really do take over. That's real. But even in the middle of that — you noticed. And noticing is where agency begins. Tomorrow, see if you can catch that moment one step earlier.", "options": [], "target": "BRIDGE_1_2", "signal": "axis1:external" },
    { "id": "BRIDGE_1_2", "type": "bridge", "text": "Now let's move from how you handled things — to what you gave today.", "options": [], "target": "A2_OPEN", "signal": null },
    { "id": "A2_OPEN", "type": "question", "text": "Think of a moment today where you helped someone or did something extra. What was going through your mind?", "options": ["It felt right — I didn't need a reason", "I helped but quietly hoped someone would notice", "I waited to see if someone else would step up first", "I felt others should have done it instead of me"], "target": null, "signal": null },
    { "id": "A2_D1", "type": "decision", "text": null, "options": [{ "condition": "answer=It felt right — I didn't need a reason", "target": "A2_Q2_CONT" }, { "condition": "answer=I helped but quietly hoped someone would notice|I waited to see if someone else would step up first|I felt others should have done it instead of me", "target": "A2_Q2_ENT" }, { "condition": "default", "target": "A2_Q2_ENT" }], "target": null, "signal": null },
    { "id": "A2_Q2_CONT", "type": "question", "text": "When you helped — did you think about whether they would return the favour someday?", "options": ["No — that thought didn't come", "Briefly, but it didn't change what I did", "Yes — I hoped they would remember", "I wasn't sure what I expected"], "target": null, "signal": "axis2:contribution" },
    { "id": "A2_Q2_ENT", "type": "question", "text": "When your effort goes unnoticed — how does that usually sit with you?", "options": ["It bothers me more than I'd like to admit", "I remind myself the work matters regardless", "I start wondering if it was worth it", "I feel okay — I know my own value"], "target": null, "signal": "axis2:entitlement" },
    { "id": "A2_D2", "type": "decision", "text": null, "options": [{ "condition": "signal:axis2:contribution>=1", "target": "A2_R_CONT" }, { "condition": "signal:axis2:entitlement>=1", "target": "A2_R_ENT" }, { "condition": "default", "target": "A2_R_ENT" }], "target": null, "signal": null },
    { "id": "A2_R_CONT", "type": "reflection", "text": "You gave without keeping score. That's rarer than it sounds — most people help with at least one eye on the ledger. The fact that you move toward need without calculating return is something worth carrying forward.", "options": [], "target": "BRIDGE_2_3", "signal": "axis2:contribution" },
    { "id": "A2_R_ENT", "type": "reflection", "text": "Wanting to be seen for what you give — that's human, not shameful. The question is whether that need is driving your choices or just following them. Today, just notice which it was.", "options": [], "target": "BRIDGE_2_3", "signal": "axis2:entitlement" },
    { "id": "BRIDGE_2_3", "type": "bridge", "text": "One last shift — from what you gave, to who you kept in mind today.", "options": [], "target": "A3_OPEN", "signal": null },
    { "id": "A3_OPEN", "type": "question", "text": "When you had a disagreement or difficult conversation today — what were you mostly thinking about?", "options": ["Making sure my point was heard", "Whether the other person might actually be right", "How this situation was affecting the other person", "How to end the conversation quickly"], "target": null, "signal": null },
    { "id": "A3_D1", "type": "decision", "text": null, "options": [{ "condition": "answer=Whether the other person might actually be right|How this situation was affecting the other person", "target": "A3_Q2_WIDE" }, { "condition": "answer=Making sure my point was heard|How to end the conversation quickly", "target": "A3_Q2_SELF" }, { "condition": "default", "target": "A3_Q2_SELF" }], "target": null, "signal": null },
    { "id": "A3_Q2_WIDE", "type": "question", "text": "When you realized the other person might be right — what did you do with that feeling?", "options": ["I said so — I told them they had a point", "I held it quietly but it changed how I responded", "I sat with it but didn't act on it yet", "I pushed past it to finish making my point"], "target": null, "signal": "axis3:altrocentric" },
    { "id": "A3_Q2_SELF", "type": "question", "text": "After the conversation ended — did you think about how the other person was feeling?", "options": ["Yes — I wondered if I had been fair to them", "Briefly — then moved on", "Not really — I was focused on my own feelings", "Only if they seemed visibly upset"], "target": null, "signal": "axis3:self_centric" },
    { "id": "A3_D2", "type": "decision", "text": null, "options": [{ "condition": "signal:axis3:altrocentric>=1", "target": "A3_R_WIDE" }, { "condition": "signal:axis3:self_centric>=1", "target": "A3_R_SELF" }, { "condition": "default", "target": "A3_R_WIDE" }], "target": null, "signal": null },
    { "id": "A3_R_WIDE", "type": "reflection", "text": "You made room for the other person — even in the middle of disagreement. That's not weakness, that's perspective. It means you're in conversation, not just in combat. That quality keeps relationships intact when most fall apart.", "options": [], "target": "SUMMARY", "signal": "axis3:altrocentric" },
    { "id": "A3_R_SELF", "type": "reflection", "text": "Today your focus stayed close — on your own side of things. That's not wrong. Sometimes you need to be your own advocate. But notice — is there someone from today whose experience you haven't considered yet?", "options": [], "target": "SUMMARY", "signal": "axis3:self_centric" },
    { "id": "SUMMARY", "type": "summary", "text": "Here is what today showed about you.", "options": [], "target": "END", "signal": null },
    { "id": "END", "type": "end", "text": "Rest well. You showed up today — that counts.", "options": [], "target": null, "signal": null }
  ],
  "summaryTemplates": {
    "axis1": { "internal": "When plans broke down, you looked for what was still yours to do. That's agency — quiet, steady, and real.", "external": "Today felt out of your hands. The circumstances were real. And somewhere in there was still a choice — even a small one." },
    "axis2": { "contribution": "You gave without keeping score today. That's the kind of effort that holds teams together — even when no one's watching.", "entitlement": "You wanted to be seen for what you gave. That's human. The work now is making sure giving comes before the wanting." },
    "axis3": { "altrocentric": "You kept other people in your awareness today — even when it wasn't easy. That's a wider radius than most people manage.", "self_centric": "Your focus stayed on your own experience today. That has its place. Tomorrow, try widening the lens by just one person." }
  }
};

// State
let state = {
  currentId: 'START',
  answers: {},
  signals: {},
  step: 0,
  totalSteps: 9,
  axisSignals: { axis1: null, axis2: null, axis3: null }
};

function getNode(id) {
  return TREE.nodes.find(n => n.id === id);
}

function addSignal(signal) {
  if (!signal) return;
  state.signals[signal] = (state.signals[signal] || 0) + 1;
  const [axis] = signal.split(':');
  if (!state.axisSignals[axis]) state.axisSignals[axis] = signal.split(':')[1];
}

function resolveDecision(node) {
  for (const opt of node.options) {
    const cond = opt.condition;
    if (cond === 'default') return opt.target;
    if (cond.startsWith('answer=')) {
      const vals = cond.replace('answer=', '').split('|');
      const lastQ = Object.keys(state.answers).pop();
      if (lastQ && vals.includes(state.answers[lastQ])) return opt.target;
    }
    if (cond.startsWith('signal:')) {
      const [, signalKey, , val] = cond.match(/signal:([^><=]+)([><=]+)(\d+)/);
      const count = state.signals[signalKey] || 0;
      if (count >= parseInt(val)) return opt.target;
    }
  }
  return node.options[node.options.length - 1].target;
}

function advance(answerId) {
  let node = getNode(state.currentId);
  if (answerId !== undefined) state.answers[state.currentId] = answerId;
  if (node.signal) addSignal(node.signal);

  let nextId = node.target;
  if (!nextId && node.type !== 'decision') {
    // find next in sequence
  }

  // Auto-advance through decisions
  let next = getNode(nextId || state.currentId);
  while (next && next.type === 'decision') {
    nextId = resolveDecision(next);
    next = getNode(nextId);
  }

  state.currentId = nextId;
  state.step++;
  render();
}

function updateProgress() {
  const segs = document.querySelectorAll('.progress-seg');
  segs.forEach((s, i) => {
    s.classList.remove('active', 'done');
    if (i < state.step - 1) s.classList.add('done');
    else if (i === state.step - 1) s.classList.add('active');
  });
}

function buildSummary() {
  const t = TREE.summaryTemplates;
  const a1 = state.axisSignals.axis1 || 'internal';
  const a2 = state.axisSignals.axis2 || 'contribution';
  const a3 = state.axisSignals.axis3 || 'altrocentric';
  return [
    { axis: 'Axis I — Locus', text: t.axis1[a1] },
    { axis: 'Axis II — Orientation', text: t.axis2[a2] },
    { axis: 'Axis III — Radius', text: t.axis3[a3] }
  ];
}

function letters(i) { return ['A','B','C','D'][i]; }

function render() {
  const card = document.getElementById('card');
  const node = getNode(state.currentId);
  if (!node) return;

  updateProgress();

  // Fade out then in
  card.style.opacity = '0';
  card.style.transform = 'translateY(10px)';
  card.style.transition = 'opacity 0.25s ease, transform 0.25s ease';

  setTimeout(() => {
    card.innerHTML = buildCardHTML(node);
    card.style.opacity = '1';
    card.style.transform = 'translateY(0)';
    attachEvents(node);
  }, 250);
}

function buildCardHTML(node) {
  if (node.type === 'start') {
    return `
      <div class="tree-deco">🌿</div>
      <div class="start-text">${node.text}</div>
      <button class="btn" onclick="advance()">Begin</button>
    `;
  }

  if (node.type === 'end') {
    return `
      <div class="tree-deco">✦</div>
      <div class="end-text">${node.text}</div>
      <button class="btn" onclick="resetApp()">Begin Again</button>
    `;
  }

  if (node.type === 'bridge') {
    return `
      <div class="node-type">transition</div>
      <div class="bridge-text">${node.text}</div>
      <button class="btn" onclick="advance()">Continue →</button>
    `;
  }

  if (node.type === 'reflection') {
    return `
      <div class="node-type">reflection</div>
      <div class="reflection-text">${node.text}</div>
      <button class="btn" onclick="advance()">Continue →</button>
    `;
  }

  if (node.type === 'summary') {
    const blocks = buildSummary();
    return `
      <div class="node-type">your day, reflected</div>
      <div style="margin-bottom:32px;">
        ${blocks.map(b => `
          <div class="summary-block">
            <div class="summary-axis">${b.axis}</div>
            <div class="summary-text">${b.text}</div>
          </div>
        `).join('')}
      </div>
      <button class="btn" onclick="advance()">Close →</button>
    `;
  }

  if (node.type === 'question') {
    return `
      <div class="node-type">question</div>
      <div class="question-text">${node.text}</div>
      <div class="options" id="options">
        ${node.options.map((opt, i) => `
          <button class="option" data-value="${opt}" onclick="selectOption(this, '${opt.replace(/'/g,"\\'")}')">
            <span class="option-letter">${letters(i)}</span>
            ${opt}
          </button>
        `).join('')}
      </div>
      <div class="btn-row">
        <button class="btn" id="continueBtn" disabled onclick="confirmOption()">Continue →</button>
      </div>
    `;
  }

  return '';
}

let selectedValue = null;

function selectOption(el, val) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  selectedValue = val;
  const btn = document.getElementById('continueBtn');
  if (btn) btn.disabled = false;
}

function confirmOption() {
  if (selectedValue !== null) {
    advance(selectedValue);
    selectedValue = null;
  }
}

function attachEvents(node) {}

function resetApp() {
  state = {
    currentId: 'START',
    answers: {},
    signals: {},
    step: 0,
    totalSteps: 9,
    axisSignals: { axis1: null, axis2: null, axis3: null }
  };
  render();
}

// Handle decisions: when navigating to a decision node, resolve immediately
